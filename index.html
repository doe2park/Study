<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CE268B Glossary</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0b0f1a;
    --bg2: #111827;
    --bg3: #1e293b;
    --border: #1e293b;
    --text: #e2e8f0;
    --muted: #64748b;
    --subtle: #334155;
    --accent: #818cf8;
  }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Text', sans-serif; font-size: 16px; min-height: 100vh; }

  /* TOP BAR */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(11,15,26,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 0;
  }
  .topbar-title { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 1px; margin-bottom: 2px; }
  .topbar-sub { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
  .search-wrap { position: relative; margin-bottom: 10px; }
  .search-input {
    width: 100%; padding: 10px 14px 10px 38px;
    background: var(--bg3); border: 1px solid var(--subtle);
    border-radius: 10px; color: var(--text); font-size: 15px;
    outline: none; -webkit-appearance: none;
  }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 15px; pointer-events: none; }

  /* TABS */
  .tabs { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; padding-bottom: 0; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 8px 14px; font-size: 12px; font-weight: 600;
    border: none; background: none; cursor: pointer; color: var(--muted);
    border-bottom: 2px solid transparent; white-space: nowrap;
    transition: all 0.15s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* CARDS */
  .list { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 80px; }

  .card {
    background: var(--bg2); border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden; transition: border-color 0.2s;
  }
  .card.starred { border-color: #f59e0b55; }

  .card-head {
    display: flex; align-items: center; gap: 10; padding: 14px 16px;
    cursor: pointer; user-select: none; gap: 10px;
  }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .card-term { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; line-height: 1.3; }
  .card-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 99px;
    font-weight: 700; white-space: nowrap; flex-shrink: 0;
  }
  .chevron { color: var(--muted); font-size: 13px; flex-shrink: 0; transition: transform 0.2s; }
  .card.open .chevron { transform: rotate(180deg); }

  .card-body {
    display: none; padding: 0 16px 16px; border-top: 1px solid var(--border);
  }
  .card.open .card-body { display: block; }

  .card-def { font-size: 14px; color: #94a3b8; line-height: 1.7; padding-top: 12px; }
  .card-cat-label { font-size: 10px; color: var(--muted); margin-top: 10px; letter-spacing: 1px; font-weight: 600; text-transform: uppercase; }

  .star-btn {
    background: none; border: none; cursor: pointer; font-size: 18px;
    padding: 2px 4px; flex-shrink: 0;
  }

  /* COUNT BAR */
  .count-bar { font-size: 12px; color: var(--muted); padding: 8px 14px 0; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(11,15,26,0.97);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex; padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; background: none; border: none; cursor: pointer;
    padding: 4px 0; color: var(--muted); font-size: 10px; font-weight: 600;
    transition: color 0.15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; }

  /* FLASHCARD VIEW */
  .fc-view { padding: 16px 14px; padding-bottom: 80px; }
  .fc-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .fc-counter { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .fc-progress { height: 3px; background: var(--subtle); border-radius: 99px; margin-bottom: 20px; }
  .fc-progress-inner { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.3s; }

  .flashcard {
    min-height: 220px; border-radius: 16px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 28px 24px; text-align: center;
    background: var(--bg2); border: 1px solid var(--subtle);
    transition: transform 0.08s; active:transform: scale(0.98);
    margin-bottom: 16px; position: relative;
  }
  .flashcard:active { transform: scale(0.98); }
  .fc-hint { font-size: 11px; color: var(--muted); margin-bottom: 16px; }
  .fc-front-term { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .fc-cat { font-size: 11px; padding: 3px 10px; border-radius: 99px; margin-top: 14px; font-weight: 600; }
  .fc-prio { font-size: 11px; color: #f59e0b; margin-top: 10px; }
  .fc-back-label { font-size: 11px; color: var(--muted); margin-bottom: 12px; font-weight: 600; letter-spacing: 1px; }
  .fc-back-def { font-size: 14px; color: #cbd5e1; line-height: 1.7; }

  .fc-actions { display: flex; gap: 10px; }
  .fc-btn {
    flex: 1; padding: 14px; border-radius: 12px; border: 1px solid;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.1s;
  }
  .fc-btn:active { opacity: 0.7; }
  .fc-btn.know { border-color: #10b981; background: #10b98122; color: #34d399; }
  .fc-btn.learn { border-color: #ef4444; background: #ef444422; color: #f87171; }
  .fc-nav { display: flex; gap: 8px; margin-bottom: 12px; }
  .fc-nav-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--subtle); background: var(--bg3); color: var(--muted); font-size: 14px; cursor: pointer; }

  /* QUIZ VIEW */
  .quiz-view { padding: 16px 14px; padding-bottom: 80px; }
  .quiz-q { font-size: 11px; color: var(--muted); margin-bottom: 6px; font-weight: 600; letter-spacing: 1px; }
  .quiz-term { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 20px; line-height: 1.35; }
  .quiz-opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .quiz-opt {
    padding: 14px 16px; border-radius: 12px; border: 1px solid var(--subtle);
    background: var(--bg2); color: #94a3b8; font-size: 14px; line-height: 1.5;
    cursor: pointer; text-align: left; transition: all 0.15s;
  }
  .quiz-opt:active { opacity: 0.8; }
  .quiz-opt.correct { border-color: #10b981; background: #10b98122; color: #34d399; }
  .quiz-opt.wrong { border-color: #ef4444; background: #ef444422; color: #f87171; }
  .quiz-feedback { padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 14px; text-align: center; }
  .quiz-feedback.correct { background: #10b98122; color: #34d399; }
  .quiz-feedback.wrong { background: #ef444422; color: #f87171; }
  .quiz-next { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
  .quiz-start { background: var(--bg2); border-radius: 14px; padding: 32px 20px; text-align: center; }
  .quiz-start h2 { color: var(--text); margin-bottom: 8px; }
  .quiz-start p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .quiz-start-btn { padding: 14px 40px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; }
  .quiz-result { background: var(--bg2); border-radius: 14px; padding: 40px 20px; text-align: center; }
  .quiz-result-score { font-size: 52px; font-weight: 800; margin-bottom: 8px; }
  .quiz-result-msg { font-size: 16px; color: var(--muted); margin-bottom: 24px; }
  .quiz-result-btn { padding: 12px 32px; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 15px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
const CAT_COLORS = {
  "Supply Chain": "#3b82f6",
  "Materials": "#f59e0b",
  "Lean/TPS": "#10b981",
  "Production": "#8b5cf6",
  "Process Types": "#ec4899",
  "Simulation": "#ef4444",
  "Scheduling": "#6366f1",
  "CODP": "#14b8a6",
  "Statistics": "#f97316",
};

const TERMS = [
  // Supply Chain
  { term: "Supply Chain Management (SCM)", cat: "Supply Chain", star: true,
    def: "A network of companies collaborating to satisfy end-customer needs. Encompasses flow of materials, information, and money from raw material to final use." },
  { term: "Four Roles of SCM (Vrijhoef & Koskela)", cat: "Supply Chain", star: true,
    def: "①Manage supply→site interface ②Improve supply chain performance ③Transfer on-site work to upstream (prefab) ④Integrate and redesign the entire supply chain." },
  { term: "Owner Managed Inventory (OMI)", cat: "Supply Chain", star: false,
    def: "The owner (not contractor) takes responsibility for procuring and managing certain materials across the project." },
  { term: "Postponement of Customization", cat: "Supply Chain", star: false,
    def: "Keep product generic as long as possible; apply customer-specific customization only when an order is confirmed, reducing inventory risk." },
  { term: "Irreversible Customization", cat: "Supply Chain", star: false,
    def: "A modification that permanently commits a product to one specific customer — it can no longer be substituted or reassigned after this point." },
  { term: "Multi-project Procurement", cat: "Supply Chain", star: false,
    def: "Consolidating purchases across multiple projects to gain volume discounts and simplify supplier relationships." },
  { term: "Vertical Integration", cat: "Supply Chain", star: false,
    def: "A company controlling multiple stages of the supply chain (e.g., manufacturing and distribution), reducing reliance on external suppliers." },
  { term: "Lead Time", cat: "Supply Chain", star: false,
    def: "Time from placing an order to receiving the goods, including design, fabrication, and delivery." },
  { term: "Supplier Managed Inventory (SMI/VMI)", cat: "Supply Chain", star: false,
    def: "Inventory held at the customer's site but managed and replenished by the supplier based on agreed consumption triggers." },
  { term: "Milk-Run System", cat: "Supply Chain", star: false,
    def: "A vehicle makes regular, scheduled pickups from multiple suppliers in one route, reducing transport waste and inventory." },
  { term: "Dis-intermediation", cat: "Supply Chain", star: false,
    def: "Removing middlemen so buyers deal directly with manufacturers, cutting cost and lead time." },
  { term: "Transparency (in supply chain)", cat: "Supply Chain", star: false,
    def: "All supply chain partners share visibility of demand, inventory levels, and lead times — reduces the bullwhip effect." },
  { term: "Point-of-Sale (POS) Data", cat: "Supply Chain", star: false,
    def: "Real-time retail sales data used to trigger replenishment and improve demand forecasting." },

  // Materials
  { term: "Trial Allocation", cat: "Materials", star: true,
    def: "A preliminary reservation of materials to a specific project or work order before final allocation is confirmed — used to plan ahead without committing fully." },
  { term: "Commodity Material", cat: "Materials", star: true,
    def: "Material that is interchangeable across manufacturers (any brand works), allowing substitution. Also: bulk material ordered without a unit-by-unit quantity take-off." },
  { term: "Expediting", cat: "Materials", star: true,
    def: "Effort to speed up a supplier's delivery beyond the originally agreed timeline. Considered waste because it signals a reliable promise was not made or kept." },
  { term: "Backorder", cat: "Materials", star: false,
    def: "An order that cannot be filled immediately because the item is out of stock; it will be fulfilled when stock is available." },
  { term: "Bill of Materials (BOM)", cat: "Materials", star: false,
    def: "A complete list of all materials, components, and quantities needed to produce a product." },
  { term: "Fabrication", cat: "Materials", star: false,
    def: "Customizing raw or semi-finished material through cutting, drilling, welding, or bending to meet project specifications." },
  { term: "OS&D (Over, Short, and Damaged)", cat: "Materials", star: false,
    def: "A receiving report filed when delivered goods are more, fewer, or damaged compared to what was ordered." },
  { term: "Quantity Take-Off (QTO)", cat: "Materials", star: false,
    def: "Measuring and listing all materials required from project drawings and specifications before procurement begins." },
  { term: "Purchase Order (PO)", cat: "Materials", star: false,
    def: "A formal buyer-issued document committing to purchase goods or services at agreed price, quantity, and delivery terms." },
  { term: "SKU (Stock-Keeping Unit)", cat: "Materials", star: false,
    def: "A unique alphanumeric identifier assigned to a specific product variant in an inventory system." },
  { term: "UPC (Universal Product Code)", cat: "Materials", star: false,
    def: "A standardized barcode on retail products enabling tracking and identification throughout the supply chain." },

  // Lean / TPS
  { term: "Just-in-Time (JIT)", cat: "Lean/TPS", star: true,
    def: "Delivering inputs to a process exactly when needed — not early (creating inventory waste) and not late (causing starvation). One of two pillars of the Toyota Production System." },
  { term: "Little's Law", cat: "Lean/TPS", star: true,
    def: "WIP = TH × CT. Work In Process equals Throughput rate multiplied by Cycle Time. Reducing CT or TH directly reduces the inventory in the system." },
  { term: "Decoupling Buffer", cat: "Lean/TPS", star: false,
    def: "An inventory buffer placed between two processes so each can operate at its own pace, independent of the other." },
  { term: "Buffer", cat: "Lean/TPS", star: false,
    def: "A mechanism that absorbs variation in a production system. Types: capacity, inventory, time, money (contingency), and space." },
  { term: "Pull / Pull-based System", cat: "Lean/TPS", star: false,
    def: "Work or materials are released only when the downstream process signals it is ready to receive them. Prevents overproduction." },
  { term: "Push / Push-based System", cat: "Lean/TPS", star: false,
    def: "Work or materials are released according to a schedule, regardless of whether the downstream process is ready to accept them." },
  { term: "Kanban System", cat: "Lean/TPS", star: false,
    def: "A card or signal that authorizes production or retrieval of a fixed quantity. Limits WIP by linking supply to actual downstream consumption." },
  { term: "Work in Process (WIP)", cat: "Lean/TPS", star: false,
    def: "Units currently being worked on within a process — between raw materials input and finished goods output." },
  { term: "Throughput (TH)", cat: "Lean/TPS", star: false,
    def: "The output rate of a production process, expressed as units per unit of time." },
  { term: "Cycle Time (CT)", cat: "Lean/TPS", star: false,
    def: "The total time a unit spends in the production process from start to finish. CT = Batch + Move + Setup + Process + Queue time." },
  { term: "Waste (Muda)", cat: "Lean/TPS", star: false,
    def: "Anything consuming resources without adding customer value. Ohno's 7 wastes: Defects, Inventory, Overprocessing, Waiting, Motion, Transport, Overproduction." },
  { term: "Built-in Quality (BiQ)", cat: "Lean/TPS", star: false,
    def: "Achieving quality by designing operations and handoffs to prevent defects at each step — not by relying on end-of-line inspection." },
  { term: "PDCA (Plan Do Check Act)", cat: "Lean/TPS", star: false,
    def: "A continuous improvement cycle: Plan an experiment → Do it → Check if results match expectations → Act to standardize or replan." },
  { term: "TFV: Transformation, Flow, Value", cat: "Lean/TPS", star: false,
    def: "Three views of production: Transformation (convert inputs to outputs), Flow (eliminate waste and delays), Value (meet customer needs). Lean pursues all three simultaneously." },
  { term: "Value-Added Time (VAT)", cat: "Lean/TPS", star: false,
    def: "Time spent on activities that directly transform a product into something the customer values and is willing to pay for." },
  { term: "Non-value-added Time (NVAT)", cat: "Lean/TPS", star: false,
    def: "Time spent on activities that consume resources but add no value — the customer would not pay for them if they knew." },
  { term: "Toyota Production System (TPS)", cat: "Lean/TPS", star: false,
    def: "Toyota's manufacturing system built on eliminating waste, continuous improvement, JIT delivery, and built-in quality (Jidoka)." },
  { term: "House of Toyota", cat: "Lean/TPS", star: false,
    def: "Visual representation of TPS: two pillars (JIT + Jidoka) on a foundation of standardization and stability, supporting the goal of best quality, lowest cost, shortest lead time." },
  { term: "Toyota's 4P", cat: "Lean/TPS", star: false,
    def: "A pyramid of the Toyota Way: Philosophy (long-term thinking) → Process → People & Partners → Problem Solving (continuous learning)." },
  { term: "Lean Construction", cat: "Lean/TPS", star: false,
    def: "Application of lean principles — eliminate waste, improve flow, maximize value — to the design and delivery of construction projects." },
  { term: "Lean Triangle", cat: "Lean/TPS", star: false,
    def: "The three domains every project delivery system operates within: Organization, Operating System, and Commercial Terms." },
  { term: "ConWIP (Constrained Work in Process)", cat: "Lean/TPS", star: false,
    def: "A pull system that caps total WIP in the system to a fixed number — new work enters only when a completed unit exits." },
  { term: "Process Mapping", cat: "Lean/TPS", star: false,
    def: "A flowchart of all steps in a process used to identify waste, bottlenecks, and improvement opportunities." },
  { term: "Supermarket", cat: "Lean/TPS", star: false,
    def: "A small, size-limited inventory buffer between processes that is replenished by kanban pull signals." },

  // Production
  { term: "Batch / Batch Size", cat: "Production", star: false,
    def: "The number of units processed simultaneously (production batch) or moved together to the next step (transfer batch). Lean targets batch size = 1." },
  { term: "Transfer Batch", cat: "Production", star: false,
    def: "The number of units moved together from one process step to the next. Smaller transfer batches reduce lead time and WIP." },
  { term: "One-piece Flow", cat: "Production", star: false,
    def: "Units move one at a time through each process step with no intermediate staging. Batch size = 1; minimizes WIP and lead time." },
  { term: "Work Structuring", cat: "Production", star: false,
    def: "Designing operations and work sequences to achieve smooth flow, eliminate waste, and match supply with demand." },
  { term: "Synchronization", cat: "Production", star: false,
    def: "Coordinating multiple processes so all required inputs arrive exactly when needed, enabling uninterrupted flow." },
  { term: "Multi-skilling", cat: "Production", star: false,
    def: "Workers trained in skills beyond their primary trade, enabling greater flexibility and reducing bottlenecks when demand shifts." },
  { term: "Standardization", cat: "Production", star: false,
    def: "Limiting variety in parts or processes by establishing an agreed best method, which then becomes the baseline for further improvement." },
  { term: "Productivity", cat: "Production", star: false,
    def: "Output divided by input [output/input], e.g., 3 drawings per labor hour. A measure of resource efficiency." },
  { term: "Loose Coupling", cat: "Production", star: false,
    def: "Process steps separated by buffers so each can run independently. Disruptions don't propagate, but WIP and lead time increase." },
  { term: "Tight Coupling", cat: "Production", star: false,
    def: "Process steps directly linked with minimal or no buffers. Highly efficient when running smoothly, but any disruption immediately halts downstream work." },
  { term: "Starve (to starve for resources)", cat: "Production", star: false,
    def: "A process has no input to work on and sits idle — a form of waiting waste caused by upstream delays or shortages." },
  { term: "Handoff", cat: "Production", star: false,
    def: "Transferring completed output from one production step to the next. Quality handoffs require explicit, agreed-upon acceptance criteria." },
  { term: "Process Capability", cat: "Production", star: false,
    def: "The probability distribution describing natural variation in a process's output under normal operating conditions." },

  // Process Types
  { term: "Batch Flow", cat: "Process Types", star: false,
    def: "A production layout where machines are grouped by function, causing units to follow varied, jumbled paths — high flexibility but high WIP." },
  { term: "Continuous Flow", cat: "Process Types", star: false,
    def: "Production with no buffers between steps; units move immediately from one step to the next without waiting." },
  { term: "Job Shop", cat: "Process Types", star: false,
    def: "Production system for low-volume, high-variety work; machines grouped by function; each unit follows a unique route." },
  { term: "Line Flow – Machine Paced", cat: "Process Types", star: false,
    def: "Units move sequentially through fixed stations with the pace controlled by machines (e.g., a conveyor assembly line)." },
  { term: "Line Flow – Worker Paced", cat: "Process Types", star: false,
    def: "Units move sequentially through fixed stations but workers control the pace, allowing more flexibility than machine-paced." },
  { term: "Product-Process Matrix", cat: "Process Types", star: false,
    def: "Framework matching product volume and variety to the appropriate process type — from job shop (low volume, high variety) to continuous flow (high volume, standard product)." },

  // Simulation
  { term: "Discrete Event Simulation", cat: "Simulation", star: true,
    def: "A modeling method where the system state changes only at specific discrete events in time. Used in Stroboscope to simulate construction operations." },
  { term: "Future Event List (FEL)", cat: "Simulation", star: true,
    def: "The chronologically ordered list of all pending events in a simulation. The engine processes them one by one. When the FEL is empty, the simulation halts." },
  { term: "Activity (Normal or Combi)", cat: "Simulation", star: false,
    def: "Normal activity requires one type of resource to begin. Combination (Combi) activity requires multiple resource types simultaneously before it can start." },
  { term: "Activity Duration", cat: "Simulation", star: false,
    def: "The time required to complete an activity — either a fixed value or sampled from a probability distribution (e.g., Normal, Pertpg)." },
  { term: "Fork", cat: "Simulation", star: false,
    def: "A node where one flow splits into two or more parallel paths." },
  { term: "Queue", cat: "Simulation", star: false,
    def: "A waiting line where entities wait for a resource to become available. Queue time is non-value-added time." },
  { term: "Fusion Queue", cat: "Simulation", star: false,
    def: "In Stroboscope, a queue that collects multiple required inputs; the activity begins only when all required inputs are present." },
  { term: "Utilization", cat: "Simulation", star: false,
    def: "The fraction of time a resource is actively working. From Kingman's formula, high utilization causes disproportionately long queue times." },
  { term: "Warm-up Time", cat: "Simulation", star: false,
    def: "The initial simulation period before the system reaches steady state. Results from this period are discarded." },
  { term: "Seed (for RNG)", cat: "Simulation", star: false,
    def: "The starting value for a random number generator. Using the same seed reproduces the exact same sequence of random numbers." },
  { term: "Trace / Trace File", cat: "Simulation", star: false,
    def: "A record of every event and state change that occurred during a simulation run, used for debugging and analysis." },
  { term: "Stochastic Model", cat: "Simulation", star: false,
    def: "A model that incorporates randomness through probability distributions, as opposed to a deterministic model with fixed inputs." },
  { term: "Perry & Greig PERT_PG Distribution", cat: "Statistics", star: false,
    def: "A three-point distribution used in Stroboscope: Pertpg[optimistic, most likely, pessimistic]. Generates realistic, bounded duration samples." },

  // Scheduling
  { term: "Critical Path Method (CPM)", cat: "Scheduling", star: false,
    def: "Computes the shortest possible project duration using deterministic activity durations and finish-to-start relationships. The critical path is the longest sequence of activities." },
  { term: "PERT", cat: "Scheduling", star: false,
    def: "Uses three-point duration estimates (optimistic, most likely, pessimistic) to account for uncertainty. Note: tends to be too optimistic because it ignores merge bias." },
  { term: "Merge Bias", cat: "Scheduling", star: true,
    def: "When multiple parallel paths must all finish before a successor can start, the latest path governs — making schedules systematically over-optimistic if this effect is ignored." },
  { term: "Schedule Risk", cat: "Scheduling", star: false,
    def: "The probability that a project finishes later than planned, driven by duration variability, resource constraints, and merge bias." },
  { term: "Parade of Trades", cat: "Scheduling", star: false,
    def: "In construction, trades work sequentially through spaces. Variability in one trade propagates to all downstream trades, causing cumulative delays." },
  { term: "Activity-on-Node Diagram (AON)", cat: "Scheduling", star: false,
    def: "A CPM network diagram where activities are represented as nodes and dependencies as arrows between them." },
  { term: "Sequential Dependence", cat: "Scheduling", star: false,
    def: "A finish-to-start relationship: activity A must be fully complete before activity B can begin." },

  // CODP
  { term: "Customer-Order Decoupling Point (CODP)", cat: "CODP", star: true,
    def: "The point in the supply chain where production shifts from forecast-driven (upstream) to customer-order-driven (downstream). Its location determines lead time and inventory levels." },
  { term: "Assembled-to-Order (ATO)", cat: "CODP", star: false,
    def: "Parts are pre-manufactured to forecast; final assembly happens only when a customer order arrives. CODP is at assembly." },
  { term: "Engineered-to-Order (ETO)", cat: "CODP", star: false,
    def: "Both design and manufacturing are triggered by a specific customer order. Longest lead time; CODP is furthest upstream. e.g., custom structural connections." },
  { term: "Fabricated-to-Order (FTO)", cat: "CODP", star: false,
    def: "Design already exists; fabrication begins only on customer order. e.g., steel members cut to specified lengths." },
  { term: "Made-to-Order (MTO)", cat: "CODP", star: false,
    def: "Design exists; production begins only when a customer order is received. e.g., custom-mixed paint colors." },
  { term: "Made-to-Stock (MTS)", cat: "CODP", star: false,
    def: "Product is manufactured based on demand forecasts and held in finished goods inventory until a customer orders. CODP is furthest downstream. e.g., standard drywall." },

  // Statistics
  { term: "Variability", cat: "Statistics", star: true,
    def: "The degree of unpredictability in process durations, demand, or quality. The primary cause of queues and unreliable flow. Kingman: Tq ≈ V × U × T." },
  { term: "Normal Distribution", cat: "Statistics", star: false,
    def: "A symmetric bell-shaped probability distribution defined by its mean (μ) and standard deviation (σ). Many natural processes approximate this distribution." },
  { term: "Standard Deviation", cat: "Statistics", star: false,
    def: "A measure of spread in a data set. Higher standard deviation means more variability and greater schedule or quality risk." },
  { term: "Central Limit Theorem (CLT)", cat: "Statistics", star: false,
    def: "The sum of a large number of independent random variables tends toward a normal distribution, regardless of their individual distributions." },
];

const ALL_CATS = ["All", "⭐ Priority", ...Object.keys(CAT_COLORS)];

let state = {
  view: "glossary", // glossary | flashcard | quiz
  search: "",
  cat: "All",
  fcIdx: 0,
  fcFlipped: false,
  fcKnown: new Set(),
  fcUnknown: new Set(),
  quizStarted: false,
  quizTerms: [],
  quizIdx: 0,
  quizOpts: [],
  quizAnswered: null,
  quizScore: { c: 0, w: 0 },
  quizDone: false,
  expanded: new Set(),
};

function getFiltered() {
  let items = TERMS;
  if (state.cat === "⭐ Priority") items = items.filter(t => t.star);
  else if (state.cat !== "All") items = items.filter(t => t.cat === state.cat);
  if (state.search.trim()) {
    const q = state.search.toLowerCase();
    items = items.filter(t => t.term.toLowerCase().includes(q) || t.def.toLowerCase().includes(q));
  }
  return items;
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startQuiz() {
  const pool = getFiltered();
  const terms = shuffle(pool).slice(0, Math.min(10, pool.length));
  state.quizTerms = terms;
  state.quizIdx = 0;
  state.quizScore = { c: 0, w: 0 };
  state.quizAnswered = null;
  state.quizDone = false;
  state.quizStarted = true;
  genOpts();
}

function genOpts() {
  const cur = state.quizTerms[state.quizIdx];
  const pool = getFiltered();
  const wrong = shuffle(pool.filter(t => t.term !== cur.term)).slice(0, 3);
  state.quizOpts = shuffle([...wrong, cur]);
  state.quizAnswered = null;
}

function render() {
  document.getElementById("app").innerHTML = buildApp();
  bindEvents();
}

function buildApp() {
  const filtered = getFiltered();
  return `
    ${buildTopBar()}
    <div id="main-content">
      ${state.view === "glossary" ? buildGlossary(filtered) : ""}
      ${state.view === "flashcard" ? buildFlashcard(filtered) : ""}
      ${state.view === "quiz" ? buildQuiz(filtered) : ""}
    </div>
    ${buildBottomNav()}
  `;
}

function buildTopBar() {
  return `
  <div class="topbar">
    <div class="topbar-title">CE268B · LEAN CONSTRUCTION & SCM</div>
    <div class="topbar-sub">${TERMS.length} terms · 9 categories · Quiz ready</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search-input" type="search" placeholder="Search terms..." value="${state.search}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <div class="tabs">
      ${ALL_CATS.map(c => `<button class="tab${state.cat === c ? " active" : ""}" data-cat="${c}">${c}</button>`).join("")}
    </div>
  </div>`;
}

function buildGlossary(items) {
  if (!items.length) return `<div class="empty">No terms found for "${state.search}"</div>`;
  return `
  <div class="count-bar">${items.length} terms${state.search ? ` matching "${state.search}"` : ""}</div>
  <div class="list">
    ${items.map((t, i) => {
      const color = CAT_COLORS[t.cat] || "#818cf8";
      const isOpen = state.expanded.has(t.term);
      return `
      <div class="card${t.star ? " starred" : ""}${isOpen ? " open" : ""}" data-term="${t.term.replace(/"/g, "&quot;")}">
        <div class="card-head">
          <div class="cat-dot" style="background:${color}"></div>
          <span class="card-term">${t.term}</span>
          ${t.star ? `<span class="card-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">⭐</span>` : ""}
          <span class="chevron">▼</span>
        </div>
        <div class="card-body">
          <div style="background:#0b0f1a;border-radius:8px;padding:10px 12px;margin-bottom:10px;border-left:3px solid ${color}">
            <div style="font-size:10px;color:${color};font-weight:700;letter-spacing:1px;margin-bottom:4px">핵심 요약</div>
            <p style="margin:0;color:#f1f5f9;font-size:15px;font-weight:600;line-height:1.4">${t.short || t.def}</p>
          </div>
          <p class="card-def">${t.def}</p>
          <div class="card-cat-label">${t.cat}</div>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

function buildFlashcard(items) {
  if (!items.length) return `<div class="empty">No terms in this category</div>`;
  const idx = Math.min(state.fcIdx, items.length - 1);
  const card = items[idx];
  const color = CAT_COLORS[card.cat] || "#818cf8";
  const known = state.fcKnown.size;
  const pct = Math.round((known / TERMS.length) * 100);

  return `
  <div class="fc-view">
    <div class="fc-meta">
      <span class="fc-counter">${idx + 1} / ${items.length}</span>
      <span style="font-size:12px;color:#10b981">${known} known (${pct}%)</span>
    </div>
    <div class="fc-progress"><div class="fc-progress-inner" style="width:${(idx/items.length)*100}%"></div></div>

    <div class="flashcard" id="flashcard">
      ${!state.fcFlipped ? `
        <div class="fc-hint">탭하면 설명 보기</div>
        <div class="fc-front-term">${card.term}</div>
        <span class="fc-cat" style="background:${color}22;color:${color}">${card.cat}</span>
        ${card.star ? `<div class="fc-prio">⭐ 시험 출제 가능</div>` : ""}
      ` : `
        <div style="background:${color}22;border-radius:8px;padding:10px 14px;margin-bottom:14px;width:100%;box-sizing:border-box">
          <div style="font-size:10px;color:${color};font-weight:700;letter-spacing:1px;margin-bottom:4px">핵심 요약</div>
          <div style="color:#f1f5f9;font-size:15px;font-weight:700;line-height:1.4">${card.short || card.def}</div>
        </div>
        <div class="fc-back-label">전체 설명</div>
        <div class="fc-back-def">${card.def}</div>
      `}
    </div>

    <div class="fc-nav">
      <button class="fc-nav-btn" id="fc-prev">← Prev</button>
      <button class="fc-nav-btn" id="fc-next">Next →</button>
    </div>
    <div class="fc-actions">
      <button class="fc-btn learn" id="fc-unknown">✗ Still Learning</button>
      <button class="fc-btn know" id="fc-known">✓ Got It!</button>
    </div>
    ${state.fcUnknown.size > 0 ? `<div style="text-align:center;margin-top:12px;font-size:12px;color:#f59e0b">${state.fcUnknown.size} cards still to master</div>` : ""}
  </div>`;
}

function buildQuiz(items) {
  if (!state.quizStarted) {
    return `
    <div class="quiz-view">
      <div class="quiz-start">
        <div style="font-size:48px;margin-bottom:12px">🎯</div>
        <h2>Multiple Choice Quiz</h2>
        <p>10 questions from <strong style="color:#818cf8">${state.cat === "All" ? "all categories" : state.cat}</strong> (${items.length} terms available)</p>
        <button class="quiz-start-btn" id="quiz-start-btn">Start Quiz</button>
      </div>
    </div>`;
  }
  if (state.quizDone) {
    const score = state.quizScore.c;
    const color = score >= 8 ? "#10b981" : score >= 6 ? "#f59e0b" : "#ef4444";
    return `
    <div class="quiz-view">
      <div class="quiz-result">
        <div class="quiz-result-score" style="color:${color}">${score}/10</div>
        <div class="quiz-result-msg">${score >= 8 ? "🏆 Excellent — ready for the exam!" : score >= 6 ? "👍 Good — review weak areas" : "📚 Keep studying with flashcards"}</div>
        <div style="display:flex;gap:10px;justify-content:center">
          <button class="quiz-result-btn" id="quiz-retry">Retry</button>
          <button class="quiz-result-btn" style="background:#1e293b;border:1px solid #334155" id="quiz-back">Back</button>
        </div>
      </div>
    </div>`;
  }

  const cur = state.quizTerms[state.quizIdx];
  const color = CAT_COLORS[cur.cat] || "#818cf8";
  const pct = (state.quizIdx / state.quizTerms.length) * 100;

  return `
  <div class="quiz-view">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:12px;color:#64748b;font-variant-numeric:tabular-nums">${state.quizIdx + 1} / ${state.quizTerms.length}</span>
      <div style="display:flex;gap:12px">
        <span style="font-size:13px;color:#34d399">✓ ${state.quizScore.c}</span>
        <span style="font-size:13px;color:#f87171">✗ ${state.quizScore.w}</span>
      </div>
    </div>
    <div style="height:3px;background:#1e293b;border-radius:99px;margin-bottom:20px">
      <div style="height:100%;width:${pct}%;background:#818cf8;border-radius:99px;transition:width 0.3s"></div>
    </div>
    <div class="quiz-q">DEFINE THIS TERM:</div>
    <div class="quiz-term">${cur.term}
      <span style="font-size:12px;padding:2px 8px;border-radius:99px;margin-left:8px;background:${color}22;color:${color};vertical-align:middle">${cur.cat}</span>
    </div>
    <div class="quiz-opts">
      ${state.quizOpts.map((opt, i) => {
        const isCorrect = opt.term === cur.term;
        let cls = "quiz-opt";
        if (state.quizAnswered !== null) {
          if (isCorrect) cls += " correct";
        }
        return `<button class="${cls}" data-qi="${i}">${opt.def.substring(0, 160)}${opt.def.length > 160 ? "..." : ""}</button>`;
      }).join("")}
    </div>
    ${state.quizAnswered !== null ? `
      <div class="quiz-feedback ${state.quizAnswered}">
        ${state.quizAnswered === "correct" ? "✓ Correct!" : `✗ Correct answer: "${cur.term}"`}
      </div>
      <button class="quiz-next" id="quiz-next-btn">
        ${state.quizIdx + 1 >= state.quizTerms.length ? "See Results →" : "Next Question →"}
      </button>
    ` : ""}
  </div>`;
}

function buildBottomNav() {
  const items = [
    { id: "glossary", icon: "📖", label: "Glossary" },
    { id: "flashcard", icon: "🃏", label: "Flashcards" },
    { id: "quiz", icon: "🎯", label: "Quiz" },
  ];
  return `
  <nav class="bottom-nav">
    ${items.map(it => `
      <button class="nav-btn${state.view === it.id ? " active" : ""}" data-view="${it.id}">
        <span class="nav-icon">${it.icon}</span>
        ${it.label}
      </button>
    `).join("")}
  </nav>`;
}

function bindEvents() {
  // Search
  const si = document.getElementById("search-input");
  if (si) si.addEventListener("input", e => { state.search = e.target.value; render(); });

  // Category tabs
  document.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => { state.cat = btn.dataset.cat; state.fcIdx = 0; render(); });
  });

  // Bottom nav
  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => { state.view = btn.dataset.view; render(); });
  });

  // Glossary expand
  document.querySelectorAll(".card").forEach(card => {
    card.querySelector(".card-head")?.addEventListener("click", () => {
      const term = card.dataset.term;
      if (state.expanded.has(term)) state.expanded.delete(term);
      else state.expanded.add(term);
      render();
    });
  });

  // Flashcard flip
  const fc = document.getElementById("flashcard");
  if (fc) fc.addEventListener("click", () => { state.fcFlipped = !state.fcFlipped; render(); });

  // FC nav
  document.getElementById("fc-prev")?.addEventListener("click", e => {
    e.stopPropagation();
    const items = getFiltered();
    state.fcIdx = (state.fcIdx - 1 + items.length) % items.length;
    state.fcFlipped = false;
    render();
  });
  document.getElementById("fc-next")?.addEventListener("click", e => {
    e.stopPropagation();
    const items = getFiltered();
    state.fcIdx = (state.fcIdx + 1) % items.length;
    state.fcFlipped = false;
    render();
  });
  document.getElementById("fc-known")?.addEventListener("click", e => {
    e.stopPropagation();
    const items = getFiltered();
    state.fcKnown.add(items[state.fcIdx].term);
    state.fcUnknown.delete(items[state.fcIdx].term);
    state.fcIdx = (state.fcIdx + 1) % items.length;
    state.fcFlipped = false;
    render();
  });
  document.getElementById("fc-unknown")?.addEventListener("click", e => {
    e.stopPropagation();
    const items = getFiltered();
    state.fcUnknown.add(items[state.fcIdx].term);
    state.fcKnown.delete(items[state.fcIdx].term);
    state.fcIdx = (state.fcIdx + 1) % items.length;
    state.fcFlipped = false;
    render();
  });

  // Quiz
  document.getElementById("quiz-start-btn")?.addEventListener("click", () => { startQuiz(); render(); });
  document.getElementById("quiz-retry")?.addEventListener("click", () => { startQuiz(); render(); });
  document.getElementById("quiz-back")?.addEventListener("click", () => { state.quizStarted = false; render(); });

  document.querySelectorAll(".quiz-opt").forEach((btn, i) => {
    btn.addEventListener("click", () => {
      if (state.quizAnswered !== null) return;
      const sel = state.quizOpts[i];
      const cur = state.quizTerms[state.quizIdx];
      const correct = sel.term === cur.term;
      state.quizAnswered = correct ? "correct" : "wrong";
      if (correct) state.quizScore.c++; else state.quizScore.w++;
      render();
    });
  });

  document.getElementById("quiz-next-btn")?.addEventListener("click", () => {
    const nextIdx = state.quizIdx + 1;
    if (nextIdx >= state.quizTerms.length) { state.quizDone = true; render(); }
    else { state.quizIdx = nextIdx; genOpts(); render(); }
  });
}

render();
</script>
</body>
</html>
